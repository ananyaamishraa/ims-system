version: "3.9"

services:
  redis:
    image: redis
    ports:
      - "6379:6379"

  postgres:
    image: postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ims_db
    ports:
      - "5432:5432"

  mongodb:
    image: mongo
    ports:
      - "27017:27017"

  backend:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - postgres
      - mongodb

  worker:
    build: .
    command: rq worker default
    depends_on:
      - redis
      - postgres
      - mongodb
